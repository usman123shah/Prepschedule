name: prepschedule
description: A new Flutter project for PrepSchedule.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.0
  
  # Database
  sqflite: ^2.2.8
  path: ^1.8.3
  
  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  
  # Networking / AI
  http: ^1.1.0
  
  # Utilities
  intl: ^0.18.0
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - lib/assets/logo1.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/logo1.png"
  min_sdk_android: 21
